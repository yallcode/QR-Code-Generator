<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QRcraft — QR Code Generator</title>
   <link rel="icon" href="icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --surface: #0f1419;
      --border: #1e2730;
      --accent: #00e5a0;
      --accent2: #00b0ff;
      --text: #e8edf2;
      --muted: #5a6a78;
      --danger: #ff4d6d;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 20px 20px;
    }

    .logo-tag {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s ease forwards;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s ease forwards;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 400;
      opacity: 0;
      animation: fadeUp 0.6s 0.3s ease forwards;
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: min(680px, calc(100% - 40px));
      margin: 40px auto 60px;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s ease forwards;
      box-shadow: 0 0 0 1px rgba(0,229,160,0.05), 0 40px 80px rgba(0,0,0,0.5);
    }

    label {
      display: block;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 50px 16px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s;
    }
    .clear-btn:hover { color: var(--danger); }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    .option-group {}

    select, input[type="color"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
      appearance: none;
    }

    select:focus { border-color: var(--accent); }

    .color-row {
      display: flex;
      gap: 10px;
    }

    .color-swatch {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      overflow: hidden;
      padding: 0;
      flex-shrink: 0;
    }

    input[type="color"] {
      width: 48px;
      height: 48px;
      padding: 4px;
      border-radius: 10px;
      cursor: pointer;
    }

    .generate-btn {
      width: 100%;
      padding: 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
      text-transform: uppercase;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,229,160,0.3);
    }

    .generate-btn:active { transform: translateY(0); }

    /* QR Output */
    .qr-section {
      position: relative;
      z-index: 1;
      width: min(360px, calc(100% - 40px));
      margin: 0 auto 60px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .qr-section.visible { opacity: 1; }

    .qr-frame {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(0,229,160,0.05), 0 30px 60px rgba(0,0,0,0.4);
    }

    #qr-output {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }

    #qr-output canvas,
    #qr-output img {
      border-radius: 8px;
    }

    .qr-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 12px;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
    }

    .download-btn:hover {
      background: rgba(0,229,160,0.08);
      transform: translateY(-1px);
    }

    .empty-state {
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 40px 0;
    }

    .error-msg {
      color: var(--danger);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      margin-top: 8px;
      display: none;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,160,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(0,229,160,0); }
    }

    .generating { animation: pulse 0.8s ease; }

    @media (max-width: 520px) {
      .options-grid { grid-template-columns: 1fr 1fr; }
      .card { padding: 24px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <header>
    <p class="logo-tag">// QRcraft</p>
    <h1>QR Code Generator</h1>
    <p class="subtitle">Turn any link or text into a scannable code — instantly.</p>
  </header>

  <div class="card">
    <div class="input-wrap">
      <label for="qr-input">URL or Text</label>
      <input type="text" id="qr-input" placeholder="https://yoursite.com or any text..." autocomplete="off" />
      <button class="clear-btn" id="clear-btn" title="Clear">✕</button>
    </div>

    <p class="error-msg" id="error-msg">Please enter some text or a URL.</p>

    <div class="options-grid">
      <div class="option-group">
        <label for="qr-size">Size</label>
        <select id="qr-size">
          <option value="150">Small — 150px</option>
          <option value="200" selected>Medium — 200px</option>
          <option value="280">Large — 280px</option>
          <option value="400">XL — 400px</option>
        </select>
      </div>

      <div class="option-group">
        <label for="qr-fg">QR Color</label>
        <input type="color" id="qr-fg" value="#000000" title="Foreground color" />
      </div>

      <div class="option-group">
        <label for="qr-bg">Background</label>
        <input type="color" id="qr-bg" value="#ffffff" title="Background color" />
      </div>
    </div>

    <button class="generate-btn" id="generate-btn">Generate QR Code</button>
  </div>

  <div class="qr-section" id="qr-section">
    <div class="qr-frame">
      <div id="qr-output">
        <p class="empty-state">Your QR code will appear here</p>
      </div>
      <p class="qr-label" id="qr-label"></p>
      <a class="download-btn" id="download-btn" style="display:none;" download="qrcode.png">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PNG
      </a>
    </div>
  </div>

  <footer>QRCRAFT &nbsp;—&nbsp; FREE &amp; OPEN SOURCE -<a href="https://yallcode.github.io/YallCode/">&nbsp;YallCode</a></footer>

  <script>
    const input = document.getElementById('qr-input');
    const clearBtn = document.getElementById('clear-btn');
    const generateBtn = document.getElementById('generate-btn');
    const qrOutput = document.getElementById('qr-output');
    const qrSection = document.getElementById('qr-section');
    const qrLabel = document.getElementById('qr-label');
    const downloadBtn = document.getElementById('download-btn');
    const errorMsg = document.getElementById('error-msg');
    const sizeSelect = document.getElementById('qr-size');
    const fgColor = document.getElementById('qr-fg');
    const bgColor = document.getElementById('qr-bg');

    let qrInstance = null;

    clearBtn.addEventListener('click', () => {
      input.value = '';
      input.focus();
    });

    // Generate on Enter key
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generateQR();
    });

    generateBtn.addEventListener('click', generateQR);

    function generateQR() {
      const text = input.value.trim();

      if (!text) {
        errorMsg.style.display = 'block';
        input.focus();
        return;
      }
      errorMsg.style.display = 'none';

      const size = parseInt(sizeSelect.value);
      const fg = fgColor.value;
      const bg = bgColor.value;

      // Clear previous
      qrOutput.innerHTML = '';
      if (qrInstance) { qrInstance.clear(); qrInstance = null; }

      // Create QR
      qrInstance = new QRCode(qrOutput, {
        text: text,
        width: size,
        height: size,
        colorDark: fg,
        colorLight: bg,
        correctLevel: QRCode.CorrectLevel.H,
      });

      // Show section
      qrSection.classList.add('visible');
      generateBtn.classList.add('generating');
      setTimeout(() => generateBtn.classList.remove('generating'), 800);

      // Update label
      const short = text.length > 40 ? text.slice(0, 37) + '…' : text;
      qrLabel.textContent = short;

      // Set up download after canvas renders
      setTimeout(() => {
        const canvas = qrOutput.querySelector('canvas');
        if (canvas) {
          downloadBtn.href = canvas.toDataURL('image/png');
          downloadBtn.style.display = 'flex';
        }
      }, 200);

      // Scroll to QR
      setTimeout(() => {
        qrSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }

    // Live download update when colors/size change
    [fgColor, bgColor, sizeSelect].forEach(el => {
      el.addEventListener('change', () => {
        if (input.value.trim()) generateQR();
      });
    });
  </script>
</body>
</html>
